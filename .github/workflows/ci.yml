name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    env:
      APP_DATABASE_URL: postgresql+psycopg://pmx:pmx_ci_password@localhost:5432/pmx_ci
      DATABASE_URL: postgresql+psycopg://pmx:pmx_ci_password@localhost:5432/pmx_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pmx
          POSTGRES_PASSWORD: pmx_ci_password
          POSTGRES_DB: pmx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pmx -d pmx_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Alembic upgrade
        run: python -m alembic upgrade head

      - name: Pytest
        run: pytest -q --cov=src/pmx --cov-report=term-missing
